```html
{% extends "layout.html" %}

{% block content %}

<div class="container py-5">
    <div class="mx-auto" style="max-width: 760px;">

        <!-- Author -->
        <div class="d-flex align-items-center mb-4">
            <img src="{{ url_for('static', filename='profile_pics/' + post.author.image_file) }}"
                 class="rounded-circle me-3"
                 width="50"
                 height="50"
                 style="object-fit: cover;">

            <div>
                <div class="fw-bold text-white">
                    {{ post.author.username }}
                </div>

                <small class="text-secondary">
                    {{ post.date_posted.strftime('%B %d, %Y') }}
                </small>
            </div>
        </div>

        <!-- Title -->
        <h1 class="article-title">
            {{ post.title }}
        </h1>

        <!-- Content -->
        <div class="article-content mt-5">
            {{ post.content }}
        </div>

        {% if current_user.is_authenticated and post.author == current_user %}

        <hr class="my-5">

        <div class="d-flex justify-content-center gap-3">

            <a href="{{ url_for('edit_post', post_id=post.id) }}"
               class="btn btn-outline-light">
                ✏️ Edit
            </a>

            <form action="{{ url_for('delete_post', post_id=post.id) }}"
                  method="POST"
                  onsubmit="return confirm('Delete this post permanently?');">

                <button class="btn btn-danger">
                    🗑 Delete
                </button>

            </form>

        </div>

        {% endif %}

    </div>
</div>

<style>
.article-title{
    font-size:4rem;
    font-weight:800;
    line-height:1.1;
    color:#fff;
    margin-bottom:2rem;
}

.article-content{
    white-space:pre-wrap;
    font-size:1.2rem;
    line-height:2;
    color:#d7dce2;
}

.article-content p{
    margin-bottom:1.6rem;
}

.article-content h2,
.article-content h3{
    margin-top:3rem;
    margin-bottom:1rem;
    color:#fff;
}

.article-content img{
    width:100%;
    border-radius:12px;
    margin:2rem 0;
}

.article-content blockquote{
    border-left:4px solid #555;
    padding-left:1rem;
    margin:2rem 0;
    color:#9aa4af;
    font-style:italic;
}
</style>

{% endblock %}
```
