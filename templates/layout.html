<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="{{ url_for('static', filename='main.css') }}">
    <link rel="icon" href="{{ url_for('static', filename='images/OIP.ico') }}">

    <title>
        {% if title %}Knights - {{ title }}{% else %}Knights{% endif %}
    </title>
</head>

<body class="{% block body_class %}{% endblock %}">

<!-- ================= NAVBAR ================= -->
<header class="topbar">
    <div class="site-container nav-container">

        <a class="site-logo" href="{{ url_for('home') }}" data-whisper="IT SEES YOU">

            <span class="logo-skull">
                <span class="skull-eye"></span>
            </span>

            Knights
        </a>

        <button class="nav-toggle" onclick="toggleNav()">☰</button>

        <nav class="nav-menu">

            <a href="{{ url_for('home') }}">Home</a>

            {% if current_user.is_authenticated %}
                <a href="{{ url_for('new_post') }}">Create</a>
                <a href="{{ url_for('account') }}">Account</a>
                <a href="{{ url_for('logout') }}" class="danger-link">Logout</a>
            {% else %}
                <a href="{{ url_for('login') }}">Login</a>
                <a href="{{ url_for('register') }}">Register</a>
            {% endif %}

            <button id="themeToggle" class="theme-toggle" type="button" onclick="toggleDarkMode()">
                🌙
            </button>

        </nav>

    </div>
</header>

<!-- ================= SEARCH ================= -->
{% if request.endpoint != "post" %}
<section class="site-container search-section">

    <form action="{{ url_for('home') }}" method="GET">
        <div class="search-panel">

            <input type="text"
                   name="q"
                   class="search-input"
                   placeholder="Search articles..."
                   value="{{ request.args.get('q','') }}">

            <select name="sort" class="search-select">
                <option value="latest" {% if request.args.get('sort') == 'latest' %}selected{% endif %}>Latest</option>
                <option value="oldest" {% if request.args.get('sort') == 'oldest' %}selected{% endif %}>Oldest</option>
            </select>

            <button class="btn btn-primary search-btn" type="submit">
                Search
            </button>

        </div>
    </form>

</section>
{% endif %}

<!-- ================= MAIN LAYOUT ================= -->
<main class="site-container main-content">

    {% block content %}{% endblock %}

</main>

<!-- ================= HORROR SPRITES ================= -->
<img id="horrorSprite" class="horror-sprite" src="" alt="">
<div id="smoke" class="smoke-effect"></div>

<!-- ================= DARK MODE ================= -->
<script>
function updateThemeButton() {
    const btn = document.getElementById("themeToggle");
    btn.textContent = document.body.classList.contains("dark-mode") ? "☀️" : "🌙";
}

function toggleDarkMode() {
    document.body.classList.toggle("dark-mode");

    localStorage.setItem(
        "darkMode",
        document.body.classList.contains("dark-mode") ? "enabled" : "disabled"
    );

    updateThemeButton();
}

window.addEventListener("load", () => {
    if (localStorage.getItem("darkMode") === "enabled") {
        document.body.classList.add("dark-mode");
    }
    updateThemeButton();
});

function toggleNav() {
    document.querySelector(".nav-menu").classList.toggle("active");
}
</script>

<!-- ================= HORROR MODE SYSTEM ================= -->
<script>
const logo = document.querySelector(".site-logo");
const eye = document.querySelector(".skull-eye");

let horrorMode = false;
let hoverTimer = null;

const popup = document.createElement("div");
popup.className = "watch-popup";
popup.textContent = "IT’S WATCHING";
document.body.appendChild(popup);

let tx = 0, ty = 0;
let cx = 0, cy = 0;
let lastMove = Date.now();
let watchTimer;

const whisper = new Audio("https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3");
whisper.volume = 0.25;

/* ================= SPRITES ================= */

const sprite = document.getElementById("horrorSprite");
const smoke = document.getElementById("smoke");

let scareImages = [];
let spawnTimeout = null;
let hideTimeout = null;

/* load JSON */
fetch("/static/images/scares/scares.json")
    .then(res => res.json())
    .then(data => {
        scareImages = data.map(img => `/static/images/scares/${img}`);
    });

function scheduleNextScare() {
    if (!horrorMode || scareImages.length === 0) return;

    const delay = 1000 + Math.random() * 2000;

    spawnTimeout = setTimeout(() => {
        showScare();
    }, delay);
}

function showScare() {
    if (!horrorMode) return;

    sprite.src = scareImages[Math.floor(Math.random() * scareImages.length)];

    const maxX = window.innerWidth - 200;
    const maxY = window.innerHeight - 200;

    sprite.style.left = Math.random() * maxX + "px";
    sprite.style.top = Math.random() * maxY + "px";

    sprite.classList.add("show");

    hideTimeout = setTimeout(() => {
        sprite.classList.remove("show");
        scheduleNextScare();
    }, 3000);
}

function disappearIntoSmoke() {
    clearTimeout(hideTimeout);

    smoke.style.left = sprite.style.left;
    smoke.style.top = sprite.style.top;

    sprite.classList.remove("show");

    smoke.classList.remove("animate");
    void smoke.offsetWidth;
    smoke.classList.add("animate");

    scheduleNextScare();
}

sprite.addEventListener("click", disappearIntoSmoke);
sprite.addEventListener("touchstart", (e) => {
    e.preventDefault();
    disappearIntoSmoke();
});

/* ================= CORE HORROR ================= */

function showPopup() {
    if (!horrorMode) return;
    popup.classList.add("show");
    setTimeout(() => popup.classList.remove("show"), 2000);
}

function resetHorror() {
    horrorMode = false;

    document.body.classList.remove("logo-active");
    popup.classList.remove("show");

    clearTimeout(spawnTimeout);
    clearTimeout(hideTimeout);
    clearTimeout(watchTimer);

    sprite.classList.remove("show");
    smoke.classList.remove("animate");
}

/* animation */
function animate() {
    const idle = Date.now() - lastMove > 900;

    cx += (tx - cx) * 0.08;
    cy += (ty - cy) * 0.08;

    if (logo) {
        logo.style.transform = `
            perspective(700px)
            rotateX(${cy * -1}deg)
            rotateY(${cx}deg)
        `;
    }

    if (eye) {
        eye.style.height = horrorMode ? "6px" : "8px";
        eye.style.opacity = horrorMode && idle ? "0.4" : "1";

        eye.style.transform = `
            translate(-50%,-50%)
            translate(${cx * (horrorMode ? 1.5 : 1)}px,
                      ${cy * (horrorMode ? 1.5 : 1)}px)
        `;
    }

    requestAnimationFrame(animate);
}
animate();

/* mouse tracking */
document.addEventListener("mousemove", (e) => {
    if (!logo) return;

    const rect = logo.getBoundingClientRect();

    tx = (e.clientX - (rect.left + rect.width / 2)) / window.innerWidth * 10;
    ty = (e.clientY - (rect.top + rect.height / 2)) / window.innerHeight * 10;

    lastMove = Date.now();

    if (horrorMode) {
        clearTimeout(watchTimer);
        watchTimer = setTimeout(showPopup, 2000);
    }
});

/* ================= TRIGGERS ================= */

if (logo) {
    logo.addEventListener("mouseenter", () => {
        hoverTimer = setTimeout(() => {
            horrorMode = true;
            document.body.classList.add("logo-active");

            whisper.currentTime = 0;
            whisper.play().catch(() => {});

            scheduleNextScare();
        }, 3000);
    });

    logo.addEventListener("mouseleave", () => {
        clearTimeout(hoverTimer);
    });

    logo.addEventListener("click", () => {
        resetHorror();
    });
}
</script>

</body>
</html>
